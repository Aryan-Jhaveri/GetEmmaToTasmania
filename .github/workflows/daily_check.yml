name: Daily Flight Check

# Tracker active through 2026-06-30 (last departure date).
# After that the Python script exits immediately — no API calls are made.
# To stop the cron from triggering entirely once the tracker has expired:
#   Repository → Settings → Actions → Workflows → Daily Flight Check → Disable workflow

on:
  # Runs every day at 14:00 UTC = 10:00 AM Eastern / 9:00 AM Central
  schedule:
    - cron: "0 14 * * *"

  # Manual "Run workflow" button in the Actions tab — great for testing
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account credentials to file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json

      - name: Run flight tracker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_SERVICE_ACCOUNT_PATH: /tmp/sa.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py
